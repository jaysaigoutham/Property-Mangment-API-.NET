name: property-marketplace

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: property_identity
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d property_identity"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:4.0.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 20

  kafka-init:
    image: apache/kafka:4.0.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --replication-factor 1 --partitions 3 --topic user.registered &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --replication-factor 1 --partitions 3 --topic listing.created &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --replication-factor 1 --partitions 3 --topic listing.updated &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --replication-factor 1 --partitions 3 --topic listing.approved &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --replication-factor 1 --partitions 3 --topic listing.rejected &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --replication-factor 1 --partitions 3 --topic inquiry.created &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --replication-factor 1 --partitions 3 --topic review.created &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --replication-factor 1 --partitions 3 --topic favorite.created &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --replication-factor 1 --partitions 3 --topic notification.requested"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/property-images &&
      mc anonymous set download local/property-images"

  gateway-api:
    build:
      context: .
      args:
        PROJECT: Gateway.Api
    ports:
      - "8080:8080"
    environment:
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-dev-only-signing-key-change-me-in-production-32}
      ReverseProxy__Clusters__identity__Destinations__identity-1__Address: http://identity-api:8080/
      ReverseProxy__Clusters__listings__Destinations__listings-1__Address: http://listings-api:8080/
      ReverseProxy__Clusters__media__Destinations__media-1__Address: http://media-api:8080/
      ReverseProxy__Clusters__engagement__Destinations__engagement-1__Address: http://engagement-api:8080/
      ReverseProxy__Clusters__admin__Destinations__admin-1__Address: http://admin-api:8080/
      ReverseProxy__Clusters__notifications__Destinations__notifications-1__Address: http://notifications-api:8080/
    depends_on:
      - identity-api
      - listings-api
      - media-api
      - engagement-api
      - admin-api

  identity-api:
    build:
      context: .
      args:
        PROJECT: Identity.Api
    ports:
      - "8081:8080"
    environment: &service-env
      ConnectionStrings__postgres: Host=postgres;Port=5432;Database=property_identity;Username=postgres;Password=postgres
      ConnectionStrings__identity: Host=postgres;Port=5432;Database=property_identity;Username=postgres;Password=postgres
      ConnectionStrings__listings: Host=postgres;Port=5432;Database=property_listings;Username=postgres;Password=postgres
      ConnectionStrings__media: Host=postgres;Port=5432;Database=property_media;Username=postgres;Password=postgres
      ConnectionStrings__engagement: Host=postgres;Port=5432;Database=property_engagement;Username=postgres;Password=postgres
      ConnectionStrings__notifications: Host=postgres;Port=5432;Database=property_notifications;Username=postgres;Password=postgres
      ConnectionStrings__redis: redis:6379
      Kafka__BootstrapServers: kafka:9092
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-dev-only-signing-key-change-me-in-production-32}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  listings-api:
    build:
      context: .
      args:
        PROJECT: Listings.Api
    ports:
      - "8082:8080"
    environment:
      <<: *service-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  media-api:
    build:
      context: .
      args:
        PROJECT: Media.Api
    ports:
      - "8083:8080"
    environment:
      <<: *service-env
      Minio__Endpoint: minio:9000
      Minio__PublicBaseUrl: http://localhost:9000
      Minio__AccessKey: minioadmin
      Minio__SecretKey: minioadmin
      Minio__Bucket: property-images
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully

  engagement-api:
    build:
      context: .
      args:
        PROJECT: Engagement.Api
    ports:
      - "8084:8080"
    environment:
      <<: *service-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  notifications-api:
    build:
      context: .
      args:
        PROJECT: Notifications.Api
    ports:
      - "8085:8080"
    environment:
      <<: *service-env
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  admin-api:
    build:
      context: .
      args:
        PROJECT: Admin.Api
    ports:
      - "8086:8080"
    environment:
      <<: *service-env
      Services__Identity: http://identity-api:8080
      Services__Listings: http://listings-api:8080
      Services__Engagement: http://engagement-api:8080
      Services__Notifications: http://notifications-api:8080
    depends_on:
      - identity-api
      - listings-api
      - engagement-api
      - notifications-api

volumes:
  postgres-data:
  minio-data:
